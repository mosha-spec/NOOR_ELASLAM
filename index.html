<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; overflow: hidden; background: #020617; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .app-frame {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    border: none;
    background: #ffffff;
    display: block;
  }
  .loader {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #020617 0%, #0f172a 50%, #1e293b 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 24px;
    z-index: 9999;
    transition: opacity 0.5s ease, visibility 0.5s ease;
  }
  .loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  .loader-logo {
    width: 72px;
    height: 72px;
    border-radius: 20px;
    background: linear-gradient(135deg, #10b981, #059669);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 20px 40px rgba(16, 185, 129, 0.3), inset 0 1px 0 rgba(255,255,255,0.2);
    animation: pulse 2s ease-in-out infinite;
  }
  .loader-logo svg { width: 40px; height: 40px; color: white; }
  .loader-text {
    font-family: 'Noto Naskh Arabic', 'Amiri', serif;
    font-size: 24px;
    font-weight: 700;
    background: linear-gradient(90deg, #f8fafc, #e2e8f0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .loader-sub {
    font-size: 13px;
    color: #94a3b8;
    letter-spacing: 0.5px;
  }
  .dots { display: flex; gap: 6px; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #10b981;
    animation: bounce 1.4s infinite ease-in-out both;
  }
  .dot:nth-child(1) { animation-delay: -0.32s; }
  .dot:nth-child(2) { animation-delay: -0.16s; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }
  @media (max-width: 390px) {
    .loader-logo { width: 64px; height: 64px; }
    .loader-text { font-size: 21px; }
  }
</style>
